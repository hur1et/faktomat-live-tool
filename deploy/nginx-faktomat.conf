# nginx-Snippet für den Uniserver (UEBERGABE 3a.3).
#
# Zwei Dinge sind hier nicht verhandelbar:
#   1. proxy_buffering off – sonst kommt der SSE-Fortschrittszähler nicht
#      als Stream an, sondern gebündelt am Ende (= Host-View zählt nicht).
#   2. access_log off – UEBERGABE 7.2: keine Logs mit IPs. Das Host-Token
#      steht im SSE-Query-String und würde sonst mitgeloggt.
#
# Die App braucht eine eigene (Sub-)Domain, KEIN Pfad-Präfix: der Client
# baut absolute Pfade (/api/..., /static/...), die hinter einem Präfix wie
# /faktomat-live/ ins Leere zeigen würden.

server {
    listen 443 ssl;
    server_name faktomat.example.uni-jena.de;   # anpassen

    # ssl_certificate / ssl_certificate_key: bestehende Uni-Zertifikate

    access_log off;

    location / {
        proxy_pass http://127.0.0.1:8123;
        proxy_http_version 1.1;

        # SSE: nicht puffern, Verbindung lange offen halten.
        proxy_buffering off;
        proxy_read_timeout 3600s;

        # Damit der QR-Code die öffentliche Adresse kodiert (server/app.py
        # liest X-Forwarded-Proto/-Host).
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
