# Apache-Snippet für den Uniserver (UEBERGABE 3a.3), falls dort Apache läuft.
#
# flushpackets=on ist die Apache-Entsprechung zu nginx' proxy_buffering off:
# ohne sie kommt der SSE-Fortschrittszähler nicht als Stream an.
# Kein CustomLog: UEBERGABE 7.2 verbietet Logs mit IPs; das Host-Token
# steht im SSE-Query-String und würde sonst mitgeloggt.
#
# Die App braucht eine eigene (Sub-)Domain, KEIN Pfad-Präfix (Begründung in
# deploy/README.md). Benötigte Module: proxy, proxy_http, headers, ssl.

<VirtualHost *:443>
    ServerName faktomat.example.uni-jena.de   # anpassen

    # SSLCertificateFile / SSLCertificateKeyFile: bestehende Uni-Zertifikate

    # Kein Access-Log für diesen vHost (Datenschutz, UEBERGABE 7.2).
    # ErrorLog darf bleiben: er enthält keine Request-URLs mit Tokens.
    CustomLog /dev/null common

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8123/ flushpackets=on timeout=3600
    ProxyPassReverse / http://127.0.0.1:8123/

    RequestHeader set X-Forwarded-Proto "https"
</VirtualHost>
